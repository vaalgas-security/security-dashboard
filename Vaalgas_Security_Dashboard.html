<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaalgas — Security Event Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f9fb; --bg-card: #ffffff; --bg-input: #f1f3f7; --bg-sidebar: #0f1923;
    --text: #1a1d23; --text2: #5a6170; --text3: #8c93a0;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
    --accent: #c8102e; --accent-dark: #a00d24; --accent-light: #fdeaed;
    --blue: #1a56a8; --blue-light: #e8f0fe;
    --info-bg: #e8f0fe; --info-text: #1a56a8;
    --success-bg: #e6f4ea; --success-text: #1e6e34;
    --warn-bg: #fff8e1; --warn-text: #7d5a00;
    --danger-bg: #fdecea; --danger-text: #b91c1c;
    --radius: 8px; --radius-lg: 14px; --radius-xl: 20px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --bg-card: #161b22; --bg-input: #1c2333; --bg-sidebar: #0a0e14;
      --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
      --accent: #e63950; --accent-dark: #c8102e; --accent-light: #2d1418;
      --blue: #79b8ff; --blue-light: #0d2a5e;
      --info-bg: #0d2a5e; --info-text: #93bbf7;
      --success-bg: #0d2e18; --success-text: #6fcf97;
      --warn-bg: #2e2000; --warn-text: #f5c518;
      --danger-bg: #3b0d0d; --danger-text: #f87171;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.4); --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
    }
  }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* ── AUTH ── */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 50%, #0f1923 100%); }
  .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
  .auth-card h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; letter-spacing: -0.3px; }
  .auth-card p { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 1.75rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
  .field input { width: 100%; padding: 11px 14px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg-input); color: var(--text); font-size: 14px; outline: none; transition: all .2s; }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,16,46,0.1); }
  .auth-err { font-size: 12px; color: var(--danger-text); text-align: center; min-height: 18px; margin-bottom: 8px; }
  .btn { padding: 11px 20px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; letter-spacing: -0.1px; }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border2); }
  .btn-danger { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-text); }
  .btn-report { background: var(--accent); color: #fff; width: 100%; }
  .btn-report:hover { background: var(--accent-dark); }
  .auth-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 16px; line-height: 1.7; }
  .ms-btn { width: 100%; padding: 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg-card); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 18px; transition: all .2s; }
  .ms-btn:hover { background: var(--bg-input); box-shadow: var(--shadow-sm); }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; color: var(--text3); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

  /* ── HEADER BAR ── */
  .header-bar { background: var(--bg-sidebar); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-bar h1 { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .header-bar p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ── DASHBOARD ── */
  .dash { max-width: 1100px; margin: 0 auto; padding: 0; }
  .dash-body { padding: 24px; }
  .topbar { display: none; }
  .badge { font-size: 11px; padding: 5px 12px; border-radius: 20px; font-weight: 500; }
  .badge-user { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  .badge-week { background: var(--accent); color: #fff; font-weight: 600; }
  .badge-sync { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }
  .dot-wait { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.4); }
  .dot-err { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.4); }
  .btn-signout { font-size: 11px; padding: 6px 14px; border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius); background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; font-weight: 500; transition: all .2s; }
  .btn-signout:hover { background: rgba(255,255,255,0.08); color: #fff; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  @media (max-width: 700px) { .stats { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); } }
  .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); transition: all .2s; position: relative; overflow: hidden; }
  .stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--border); }
  .stat:first-child::before { background: var(--accent); }
  .stat:last-child::before { background: var(--danger-text); }
  .stat:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-weight: 600; }
  .stat-val { font-size: 30px; font-weight: 700; letter-spacing: -1px; }
  .stat-val.red { color: var(--danger-text); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }
  .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); }
  .panel-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .panel-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); cursor: pointer; color: var(--text2); background: var(--bg-card); transition: all .15s; user-select: none; font-weight: 500; }
  .pill.on { background: var(--info-bg); color: var(--info-text); border-color: var(--info-text); }
  .pill:hover { border-color: var(--text3); }
  .sev-pills { display: flex; gap: 6px; }
  .sev-pill { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); cursor: pointer; color: var(--text2); background: var(--bg-card); transition: all .15s; user-select: none; font-weight: 500; }
  .sev-pill.low.on { background: var(--success-bg); color: var(--success-text); border-color: var(--success-text); }
  .sev-pill.med.on { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-text); }
  .sev-pill.high.on { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-text); }

  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 10px 14px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg-input); color: var(--text); font-size: 13px; outline: none; font-family: inherit; transition: all .2s; }
  .form-row textarea { resize: vertical; min-height: 64px; }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,16,46,0.08); }
  .btn-log { width: 100%; padding: 12px; margin-top: 12px; background: var(--accent); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; color: #fff; transition: all .2s; }
  .btn-log:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn-log:disabled { opacity: .5; cursor: default; transform: none; }

  .filters { display: flex; gap: 8px; margin-bottom: 14px; }
  .filters select { font-size: 12px; padding: 8px 12px; flex: 1; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg-input); color: var(--text); font-weight: 500; }
  .btn-refresh { padding: 8px 14px; font-size: 11px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg-card); color: var(--text2); cursor: pointer; font-weight: 600; transition: all .2s; }
  .btn-refresh:hover { background: var(--bg-input); }

  .elist { max-height: 280px; overflow-y: auto; }
  .elist::-webkit-scrollbar { width: 4px; }
  .elist::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .eitem { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .eitem:last-child { border-bottom: none; }
  .etop { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .etype { font-size: 11px; font-weight: 700; color: var(--info-text); text-transform: uppercase; letter-spacing: .03em; }
  .esev { font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
  .esev-low { background: var(--success-bg); color: var(--success-text); }
  .esev-med { background: var(--warn-bg); color: var(--warn-text); }
  .esev-high { background: var(--danger-bg); color: var(--danger-text); }
  .ets { font-size: 10px; color: var(--text3); margin-left: auto; font-weight: 500; }
  .edesc { font-size: 13px; color: var(--text); margin-top: 4px; line-height: 1.5; }
  .emeta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .btn-del { font-size: 10px; color: var(--danger-text); background: none; border: none; cursor: pointer; padding: 2px 6px; margin-left: 4px; font-weight: 600; border-radius: 4px; transition: all .15s; }
  .btn-del:hover { background: var(--danger-bg); }
  .empty { text-align: center; padding: 2.5rem 0; color: var(--text3); font-size: 13px; }

  .report-foot { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
  .cd-val { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .cd-lbl { font-size: 11px; color: var(--text3); margin-bottom: 14px; font-weight: 500; }

  /* ── MODALS ── */
  .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; backdrop-filter: blur(4px); }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2rem; width: 100%; max-width: 360px; box-shadow: var(--shadow-lg); }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
  .modal input { width: 100%; padding: 11px 14px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg-input); color: var(--text); font-size: 14px; margin-bottom: 10px; outline: none; }
  .modal input:focus { border-color: var(--accent); }
  .merr { font-size: 12px; color: var(--danger-text); min-height: 16px; margin-bottom: 10px; }
  .mbtns { display: flex; gap: 10px; }
  .mbtns button { flex: 1; padding: 10px; font-size: 13px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border2); font-weight: 600; }

  .rmodal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2rem; width: 100%; max-width: 580px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .rmodal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .rbody { font-size: 12px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; min-height: 100px; }
  .rbtns { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .rbtns button { flex: 1; padding: 11px; font-size: 14px; border-radius: var(--radius); cursor: pointer; font-weight: 600; }

  /* ── SETUP SCREEN ── */
  .setup-wrap { max-width: 640px; margin: 2rem auto; padding: 1.5rem; }
  .setup-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
  .setup-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .step-num { width: 28px; height: 28px; background: var(--accent); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .setup-card p { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 10px; }
  .code-block { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-family: 'Courier New', monospace; font-size: 12px; color: var(--text); margin: 10px 0; word-break: break-all; }
  .setup-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg-input); color: var(--text); font-size: 13px; margin-top: 8px; outline: none; font-family: 'Courier New', monospace; }
  .setup-input:focus { border-color: var(--accent); }
  .info-box { background: var(--info-bg); border-left: 3px solid var(--blue); padding: 12px 16px; border-radius: 0 var(--radius) var(--radius) 0; margin: 10px 0; font-size: 12px; color: var(--info-text); line-height: 1.6; }

  /* ── SPINNER ── */
  .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: var(--radius); font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; box-shadow: var(--shadow-md); }
  #toast.ok { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-text); opacity: 1; }
  #toast.bad { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-text); opacity: 1; }

  .hide { display: none !important; }
</style>
</head>
<body>

<div id="root"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURATION — Fill these in during setup
// ═══════════════════════════════════════════════════════
const CONFIG = {
  // Step 1: Azure App Registration
  CLIENT_ID: 'bc3a27e0-632d-4047-b4f4-8a9b52d6224d',
  TENANT_ID: 'da106b2f-273c-4005-8495-3630f61e3e9f',

  // Step 2: OneDrive Excel file path (relative to your OneDrive root)
  EXCEL_PATH: 'SecurityDashboard/SecurityEvents.xlsx',

  // Step 3: Anthropic API key for weekly report generation
  ANTHROPIC_KEY: localStorage.getItem('vaalgas_anthropic_key') || '',

  // Dashboard users — add/remove as needed
  USERS: {
    admin:   { pass: 'Security1',  role: 'Administrator' },
    officer: { pass: 'Guard2024',  role: 'Security Officer' },
    manager: { pass: 'Manager99',  role: 'Site Manager' }
  },

  // Deletion password
  DELETE_PASS: 'Admin@Delete1',

  // Microsoft Graph scopes needed
  SCOPES: ['Files.ReadWrite', 'User.Read']
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = {
  screen: CONFIG.CLIENT_ID === 'YOUR_CLIENT_ID_HERE' ? 'setup' : 'auth',
  user: null,
  msToken: null,
  events: [],
  selType: 'Incident / breach',
  selSev: 'Low',
  filterType: '',
  filterSev: '',
  pendingDelId: null,
  reportText: '',
  loading: false,
  syncStatus: 'idle', // idle | syncing | ok | err
  workbookId: null,
  worksheetId: null,
};

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
const root = document.getElementById('root');
const toast = document.getElementById('toast');

function showToast(msg, bad = false) {
  toast.textContent = msg;
  toast.className = bad ? 'bad' : 'ok';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.className = '', 3000);
}

function fmtDate(d) {
  return d.toLocaleDateString('en-ZA', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtDT(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-ZA', { weekday: 'short', day: '2-digit', month: 'short' })
    + ' ' + d.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
}

function weekRange(d) {
  const day = d.getDay(), diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d); mon.setDate(d.getDate() + diff); mon.setHours(0, 0, 0, 0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23, 59, 59, 999);
  return { mon, sun };
}
function prevWeekRange() {
  const { mon: tm } = weekRange(new Date());
  const pm = new Date(tm); pm.setDate(tm.getDate() - 7);
  const ps = new Date(tm); ps.setDate(tm.getDate() - 1); ps.setHours(23, 59, 59, 999);
  return { mon: pm, sun: ps };
}
function weekEvents() {
  const { mon, sun } = weekRange(new Date());
  return state.events.filter(e => { const d = new Date(e.dt); return d >= mon && d <= sun; });
}
function countdown() {
  const now = new Date(), d = now.getDay(), daysUntil = (8 - d) % 7 || 7;
  const next = new Date(now); next.setDate(now.getDate() + daysUntil); next.setHours(8, 0, 0, 0);
  const diff = next - now, h = Math.floor(diff / 3600000), days = Math.floor(h / 24), rh = h % 24;
  return days > 0 ? `${days}d ${rh}h` : `${h}h`;
}

// ═══════════════════════════════════════════════════════
// MICROSOFT AUTH (PKCE flow)
// ═══════════════════════════════════════════════════════
function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function signInWithMicrosoftPKCE() {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);
  const redirectUri = window.location.origin + window.location.pathname;
  const params = new URLSearchParams({
    client_id: CONFIG.CLIENT_ID,
    response_type: 'code',
    redirect_uri: redirectUri,
    scope: CONFIG.SCOPES.join(' ') + ' offline_access',
    response_mode: 'query',
    code_challenge: challenge,
    code_challenge_method: 'S256',
    prompt: 'select_account'
  });
  window.location.href = `https://login.microsoftonline.com/${CONFIG.TENANT_ID}/oauth2/v2.0/authorize?${params}`;
}

async function handlePKCECallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return null;
  const verifier = sessionStorage.getItem('pkce_verifier');
  // Capture redirect URI BEFORE clearing the URL
  const redirectUri = window.location.origin + window.location.pathname;
  // Clear the URL so it looks clean
  history.replaceState(null, '', window.location.pathname);
  if (!verifier) {
    console.warn('No PKCE verifier found — session may have been lost');
    return null;
  }
  const body = new URLSearchParams({
    client_id: CONFIG.CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: redirectUri,
    code_verifier: verifier
  });
  try {
    const resp = await fetch(`https://login.microsoftonline.com/${CONFIG.TENANT_ID}/oauth2/v2.0/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    });
    const data = await resp.json();
    console.log('Token response:', data.error || 'success');
    if (data.access_token) {
      sessionStorage.removeItem('pkce_verifier');
      return data.access_token;
    }
    if (data.error) {
      console.error('Token error:', data.error, data.error_description);
    }
  } catch(e) { console.error('Token exchange failed', e); }
  return null;
}

async function msGet(path) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    headers: { Authorization: `Bearer ${state.msToken}` }
  });
  if (!r.ok) throw new Error(`Graph API error: ${r.status}`);
  return r.json();
}

async function msPatch(path, body) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${state.msToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const errText = await r.text();
    console.error('Graph PATCH error:', r.status, errText);
    throw new Error(`Graph PATCH error: ${r.status} — ${errText}`);
  }
  return r.json();
}

async function msPost(path, body) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${state.msToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.text();
    throw new Error(`Graph POST error: ${r.status} ${err}`);
  }
  return r.json();
}

async function getWorkbook() {
  if (state.workbookId) return;
  const item = await msGet(`/me/drive/root:/${CONFIG.EXCEL_PATH}`);
  state.workbookId = item.id;
  const sheets = await msGet(`/me/drive/items/${item.id}/workbook/worksheets`);
  state.worksheetId = sheets.value[0].id;
}

async function loadEventsFromExcel() {
  state.syncStatus = 'syncing'; render();
  try {
    await getWorkbook();
    const range = await msGet(
      `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/usedRange`
    );
    const rows = range.values || [];
    // Skip header row (row 0)
    state.events = rows.slice(1).filter(r => r[0]).map(r => ({
      id: String(r[0]),
      type: String(r[1] || ''),
      sev: String(r[2] || 'Low'),
      dt: String(r[3] || ''),
      loc: String(r[4] || ''),
      desc: String(r[5] || ''),
      by: String(r[6] || '')
    }));
    state.syncStatus = 'ok';
  } catch (e) {
    state.syncStatus = 'err';
    showToast('Could not load from Excel: ' + e.message, true);
  }
  render();
}

async function appendEventToExcel(ev) {
  await getWorkbook();
  // Find next empty row
  let nextRow = 2;
  try {
    const range = await msGet(
      `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/usedRange`
    );
    nextRow = (range.values || []).length + 1;
  } catch(e) {
    nextRow = 2;
  }
  // Use rows endpoint with index (0-based) instead of range address
  const rowIndex = nextRow - 1; // convert to 0-based
  const resp = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/rows/$/add`,
    {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${state.msToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        index: null,
        values: [[ev.id, ev.type, ev.sev, ev.dt, ev.loc, ev.desc, ev.by]]
      })
    }
  );
  if (!resp.ok) {
    const errText = await resp.text();
    console.error('Row add error:', resp.status, errText);
    throw new Error(`Graph row add error: ${resp.status}`);
  }
}

async function deleteEventFromExcel(id) {
  await getWorkbook();
  const range = await msGet(
    `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/usedRange`
  );
  const rows = range.values || [];
  const rowIndex = rows.findIndex((r, i) => i > 0 && String(r[0]) === id);
  if (rowIndex === -1) return;
  const excelRow = rowIndex + 1; // 1-indexed
  // Clear the row content
  const delResp = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/range(address='A${excelRow}:G${excelRow}')`,
    {
      method: 'PATCH',
      headers: {
        Authorization: `Bearer ${state.msToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ values: [['', '', '', '', '', '', '']] })
    }
  );
  if (!delResp.ok) {
    const errText = await delResp.text();
    console.error('Delete error:', delResp.status, errText);
    throw new Error(`Graph delete error: ${delResp.status}`);
  }
}

// REPORT GENERATION
// ═══════════════════════════════════════════════════════
async function generateReport() {
  const { mon, sun } = prevWeekRange();
  const week = state.events.filter(e => {
    const d = new Date(e.dt); return d >= mon && d <= sun;
  }).sort((a, b) => new Date(a.dt) - new Date(b.dt));

  const grouped = {};
  week.forEach(e => {
    const day = new Date(e.dt).toLocaleDateString('en-ZA', { weekday: 'long', day: '2-digit', month: 'long' });
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(e);
  });

  const high = week.filter(e => e.sev === 'High').length;
  const med = week.filter(e => e.sev === 'Medium').length;
  const low = week.filter(e => e.sev === 'Low').length;

  const evText = week.length === 0
    ? 'No events were recorded during this period.'
    : Object.entries(grouped).map(([day, evts]) =>
        `${day}:\n${evts.map(e =>
          `  • [${fmtTime(e.dt)}] [${e.sev.toUpperCase()}]${e.sev === 'High' ? ' [!]' : ''} ${e.type}${e.loc ? ' — ' + e.loc : ''}: ${e.desc}${e.by ? ' (Reported by: ' + e.by + ')' : ''}`
        ).join('\n')}`
      ).join('\n\n');

  showReportModal('<span class="spin"></span> Generating report with AI...', true);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CONFIG.ANTHROPIC_KEY || localStorage.getItem('vaalgas_anthropic_key') || '',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: `You are a professional security report writer for Vaalgas (Pty) Ltd, a fuel and LPG storage, wholesale and retail company based in South Africa.

Write a formal weekly security event report:

REPORT PERIOD: ${fmtDate(mon)} to ${fmtDate(sun)}
GENERATED: ${new Date().toLocaleDateString('en-ZA', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })} at ${new Date().toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' })}
TOTAL EVENTS: ${week.length} | High: ${high} | Medium: ${med} | Low: ${low}

EVENTS:
${evText}

Write a professional report with:
1. HEADER — Organisation: Vaalgas (Pty) Ltd, Report Period, Generated, Prepared by: Security Management System
2. EXECUTIVE SUMMARY — 2-3 sentences on the week
3. STATISTICS — events by type and severity in a simple table format
4. DAILY EVENT LOG — each day as a heading, bullet points with time, [SEVERITY], type, location, description, reporter. Mark [!] on HIGH severity
5. KEY FINDINGS — patterns or concerns
6. RECOMMENDATIONS — 2-3 practical actions
7. SIGN-OFF — space for Security Manager name, signature and date

Plain text only. Professional and concise.`
        }]
      })
    });
    const data = await resp.json();
    state.reportText = data.content?.find(b => b.type === 'text')?.text || 'Report generation failed.';
    showReportModal(state.reportText, false);
  } catch (e) {
    showReportModal('Could not generate report. Check your Anthropic API key in the config.', false);
  }
}

function downloadReport() {
  if (!state.reportText) return;
  const { mon, sun } = prevWeekRange();
  const blob = new Blob([state.reportText], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Vaalgas_Security_Report_${fmtDate(mon).replace(/ /g, '-')}_to_${fmtDate(sun).replace(/ /g, '-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function signInWithMicrosoft() {
  const apiInput = document.getElementById('la');
  if (apiInput && apiInput.value.trim()) {
    localStorage.setItem('vaalgas_anthropic_key', apiInput.value.trim());
    CONFIG.ANTHROPIC_KEY = apiInput.value.trim();
  }
  signInWithMicrosoftPKCE();
}

function doLogin() {
  const u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value;
  // Save API key if provided
  const apiInput = document.getElementById('la');
  if (apiInput && apiInput.value.trim()) {
    localStorage.setItem('vaalgas_anthropic_key', apiInput.value.trim());
    CONFIG.ANTHROPIC_KEY = apiInput.value.trim();
  }
  const match = CONFIG.USERS[u];
  if (match && match.pass === p) {
    state.user = { name: u, role: match.role };
    state.screen = 'dash';
    // Check if MS token available from previous OAuth
    const saved = localStorage.getItem('vaalgas_cfg');
    if (saved) {
      const cfg = JSON.parse(saved);
      CONFIG.CLIENT_ID = cfg.clientId;
      CONFIG.TENANT_ID = cfg.tenantId;
      CONFIG.ANTHROPIC_KEY = localStorage.getItem('vaalgas_anthropic_key') || '';
    }
    if (state.msToken) {
      loadEventsFromExcel();
    } else {
      // No MS token — prompt to connect OneDrive
      state.syncStatus = 'err';
      render();
      showToast('Sign in with Microsoft to sync events to OneDrive', false);
    }
  } else {
    document.getElementById('lerr').textContent = 'Invalid username or password';
  }
}

        <div>
          <h1>Security events</h1>
          <p>Sebokeng Fuels — Live event monitoring &amp; reporting</p>
        </div>
      </div>
      <div class="header-right">
        <span class="badge badge-user">${state.user.role}: ${state.user.name}</span>
        <span class="badge badge-week">${fmtDate(mon)} – ${fmtDate(sun)}</span>
        ${!state.msToken ? `<button class="btn-signout" onclick="signInWithMicrosoft()">Connect OneDrive</button>` : ''}
        <button class="btn-signout" onclick="doLogout()">Sign out</button>
      </div>
    </div>
    <div class="dash-body">

    <div class="stats">
      <div class="stat"><div class="stat-label">This week</div><div class="stat-val">${we.length}</div><div class="stat-sub">total events</div></div>
      <div class="stat"><div class="stat-label">Incidents</div><div class="stat-val">${we.filter(e => e.type === 'Incident / breach').length}</div></div>
      <div class="stat"><div class="stat-label">Access</div><div class="stat-val">${we.filter(e => e.type === 'Access / perimeter').length}</div></div>
      <div class="stat"><div class="stat-label">Occurrences</div><div class="stat-val">${we.filter(e => e.type === 'Security occurrence').length}</div></div>
      <div class="stat"><div class="stat-label">High severity</div><div class="stat-val red">${we.filter(e => e.sev === 'High').length}</div></div>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-title">Log new event</div>
        <div class="form-row"><label>Event type</label>
          <div class="pills">
            <span class="pill ${state.selType === 'Incident / breach' ? 'on' : ''}" onclick="selType('Incident / breach')">Incident / breach</span>
            <span class="pill ${state.selType === 'Access / perimeter' ? 'on' : ''}" onclick="selType('Access / perimeter')">Access / perimeter</span>
            <span class="pill ${state.selType === 'Security occurrence' ? 'on' : ''}" onclick="selType('Security occurrence')">Security occurrence</span>
          </div>
        </div>
        <div class="form-row"><label>Severity</label>
          <div class="sev-pills">
            <span class="sev-pill low ${state.selSev === 'Low' ? 'on' : ''}" onclick="selSev('Low')">Low</span>
            <span class="sev-pill med ${state.selSev === 'Medium' ? 'on' : ''}" onclick="selSev('Medium')">Medium</span>
            <span class="sev-pill high ${state.selSev === 'High' ? 'on' : ''}" onclick="selSev('High')">High</span>
          </div>
        </div>
        <div class="form-row"><label>Date &amp; time</label><input type="datetime-local" id="edt"/></div>
        <div class="form-row"><label>Location / area</label><input type="text" id="eloc" placeholder="e.g. Gate 3, Server room"/></div>
        <div class="form-row"><label>Description</label><textarea id="edesc" placeholder="What happened?"></textarea></div>
        <div class="form-row"><label>Reported by</label><input type="text" id="eby" placeholder="Name or badge number"/></div>

            : filtered.map(e => `
              <div class="eitem">
                <div class="etop">
                  <span class="etype">${e.type}</span>
                  <span class="esev esev-${e.sev.toLowerCase()}">${e.sev}</span>

                  <button class="btn-del" onclick="openDel('${e.id}')">remove</button>

          <div class="cd-val">${countdown()}</div>

  const edt = document.getElementById('edt');
  if (edt) edt.value = loc.toISOString().slice(0, 16);

  // Monday auto-report
  if (new Date().getDay() === 1) {
    const k = 'auto_rpt_' + new Date().toDateString();
    if (!sessionStorage.getItem(k)) {
      sessionStorage.setItem(k, '1');

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function selType(t) { state.selType = t; render(); }
function selSev(s) { state.selSev = s; render(); }
function doLogout() { state.user = null; state.events = []; state.screen = 'auth'; render(); }

async function logEvent() {
  const dt = document.getElementById('edt').value;
  const desc = document.getElementById('edesc').value.trim();
  if (!dt || !desc) { showToast('Date/time and description are required', true); return; }

  const btn = document.getElementById('log-btn');
  btn.disabled = true; btn.textContent = 'Saving...';

  const ev = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    type: state.selType, sev: state.selSev, dt,
    loc: document.getElementById('eloc').value.trim(),
    desc,
    by: document.getElementById('eby').value.trim()
  };

  state.events.push(ev);

  if (state.msToken) {
    try {
      await appendEventToExcel(ev);
      state.syncStatus = 'ok';
      showToast('Event logged and saved to OneDrive Excel');
    } catch (e) {
      state.syncStatus = 'err';
      showToast('Logged locally — Excel sync failed: ' + e.message, true);
    }
  } else {
    showToast('Event logged locally (connect OneDrive to sync)');
  }
  render();
}

function openDel(id) {
  state.pendingDelId = id;
  const wrap = document.createElement('div');
  wrap.className = 'modal-wrap'; wrap.id = 'del-modal';
  wrap.innerHTML = `
    <div class="modal">
      <h3>Confirm deletion</h3>
      <p>Enter the admin deletion password to permanently remove this entry from the dashboard and the Excel file.</p>
      <input type="password" id="dp" placeholder="Deletion password"/>
      <div class="merr" id="derr"></div>
      <div class="mbtns">
        <button class="btn-secondary" onclick="closeDel()">Cancel</button>
        <button class="btn-danger" onclick="confirmDel()">Delete entry</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  setTimeout(() => document.getElementById('dp').focus(), 80);
  document.getElementById('dp').onkeydown = e => { if (e.key === 'Enter') confirmDel(); };
}
function closeDel() { document.getElementById('del-modal')?.remove(); }

async function confirmDel() {
  if (document.getElementById('dp').value !== CONFIG.DELETE_PASS) {
    document.getElementById('derr').textContent = 'Incorrect password. Access denied.'; return;
  }
  const btn = document.querySelector('#del-modal .btn-danger');
  btn.textContent = 'Deleting...'; btn.disabled = true;

  if (state.msToken) {
    try {
      await deleteEventFromExcel(state.pendingDelId);
      state.syncStatus = 'ok';
    } catch (e) {
      showToast('Excel delete failed: ' + e.message, true);
    }
  }
  state.events = state.events.filter(e => e.id !== state.pendingDelId);
  closeDel(); showToast('Entry deleted'); render();
}

function showReportModal(content, isLoading) {
  document.getElementById('r-modal')?.remove();
  const wrap = document.createElement('div');
  wrap.className = 'modal-wrap'; wrap.id = 'r-modal';
  wrap.innerHTML = `
    <div class="rmodal">
      <h3>Weekly security report</h3>
      <div class="rbody" id="rbody">${isLoading ? content : ''}</div>
      ${!isLoading ? `<div class="rbody" id="rbody-text" style="display:block">${content.replace(/</g,'&lt;')}</div>` : ''}
      <div class="rbtns">
        <button class="btn btn-primary ${isLoading ? 'hide' : ''}" id="btn-dl" onclick="downloadReport()">Download report</button>
        <button class="btn btn-secondary" onclick="document.getElementById('r-modal').remove()">Close</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
(function init() {
  // Restore saved config
  const saved = localStorage.getItem('vaalgas_cfg');
  if (saved) {
    try {
      const cfg = JSON.parse(saved);
      CONFIG.CLIENT_ID = cfg.clientId;
      CONFIG.TENANT_ID = cfg.tenantId;
      CONFIG.ANTHROPIC_KEY = localStorage.getItem('vaalgas_anthropic_key') || '';
      state.screen = 'auth';
    } catch(e) {}
  }
  // Check for PKCE callback
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('code')) {
    document.getElementById('root').innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#555;font-family:sans-serif;font-size:14px"><span style="margin-right:8px">&#9696;</span> Signing in with Microsoft...</div>';
    handlePKCECallback().then(token => {
      if (token) {
        state.msToken = token;
        state.user = { name: 'Microsoft User', role: 'Microsoft Account' };
        state.screen = 'dash';
        loadEventsFromExcel();
      } else {
        // Token exchange failed — show auth screen with error
        showToast('Microsoft sign-in failed. Please try again.', true);
        state.screen = 'auth';
        render();
      }
    }).catch(e => {
      console.error('Auth error:', e);
      state.screen = 'auth';
      render();
    });
  } else {
    render();
  }
})();
</script>
