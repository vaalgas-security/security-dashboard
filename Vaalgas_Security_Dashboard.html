<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaalgas — Security Event Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f5; --bg3: #efefef;
    --text: #1a1a1a; --text2: #555555; --text3: #888888;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e8f0fe; --info-text: #1a56a8;
    --success-bg: #e6f4ea; --success-text: #1e6e34;
    --warn-bg: #fef9e7; --warn-text: #7d5a00;
    --danger-bg: #fdecea; --danger-text: #b91c1c;
    --radius: 8px; --radius-lg: 12px;
    --blue: #1a56a8; --blue-light: #e8f0fe;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f5f5f5; --text2: #ababab; --text3: #6e6e73;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --info-bg: #0d2a5e; --info-text: #93bbf7;
      --success-bg: #0d2e18; --success-text: #6fcf97;
      --warn-bg: #2e2000; --warn-text: #f5c518;
      --danger-bg: #3b0d0d; --danger-text: #f87171;
      --blue: #93bbf7; --blue-light: #0d2a5e;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: var(--bg2); color: var(--text); min-height: 100vh; }

  /* ── AUTH ── */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 360px; }
  .auth-logo { width: 48px; height: 48px; background: var(--info-bg); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 22px; }
  .auth-card h1 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 4px; }
  .auth-card p { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 1.5rem; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; font-weight: 500; }
  .field input { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
  .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,168,0.12); }
  .auth-err { font-size: 12px; color: var(--danger-text); text-align: center; min-height: 18px; margin-bottom: 8px; }
  .btn { padding: 9px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .88; }
  .btn-primary { background: var(--blue); color: #fff; width: 100%; }
  .btn-secondary { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2); }
  .btn-danger { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-text); }
  .btn-report { background: var(--info-bg); color: var(--info-text); width: 100%; }
  .auth-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 14px; line-height: 1.6; }
  .ms-btn { width: 100%; padding: 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }
  .ms-btn:hover { background: var(--bg2); }
  .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; color: var(--text3); font-size: 11px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

  /* ── DASHBOARD ── */
  .dash { max-width: 960px; margin: 0 auto; padding: 1.25rem; }
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .topbar h1 { font-size: 20px; font-weight: 600; }
  .topbar p { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; }
  .badge-user { background: var(--bg3); color: var(--text2); }
  .badge-week { background: var(--info-bg); color: var(--info-text); }
  .badge-sync { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: #22c55e; }
  .dot-wait { background: #f59e0b; }
  .dot-err { background: #ef4444; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; font-weight: 500; }
  .stat-val { font-size: 26px; font-weight: 600; }
  .stat-val.red { color: var(--danger-text); }
  .stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .panels { grid-template-columns: 1fr; } }
  .panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .panel-title { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border2); cursor: pointer; color: var(--text2); background: var(--bg); transition: all .12s; user-select: none; }
  .pill.on { background: var(--info-bg); color: var(--info-text); border-color: var(--info-text); }
  .sev-pills { display: flex; gap: 6px; }
  .sev-pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border2); cursor: pointer; color: var(--text2); background: var(--bg); transition: all .12s; user-select: none; }
  .sev-pill.low.on { background: var(--success-bg); color: var(--success-text); border-color: var(--success-text); }
  .sev-pill.med.on { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-text); }
  .sev-pill.high.on { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-text); }

  .form-row { margin-bottom: 10px; }
  .form-row label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 3px; font-weight: 500; }
  .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
  .form-row textarea { resize: vertical; min-height: 56px; }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--blue); }
  .btn-log { width: 100%; padding: 9px; margin-top: 8px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text); }
  .btn-log:hover { background: var(--bg3); }
  .btn-log:disabled { opacity: .5; cursor: default; }

  .filters { display: flex; gap: 8px; margin-bottom: 10px; }
  .filters select { font-size: 12px; padding: 6px 8px; flex: 1; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); }
  .btn-refresh { padding: 6px 10px; font-size: 11px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text2); cursor: pointer; }
  .btn-refresh:hover { background: var(--bg2); }

  .elist { max-height: 280px; overflow-y: auto; }
  .eitem { padding: 9px 0; border-bottom: 0.5px solid var(--border); }
  .eitem:last-child { border-bottom: none; }
  .etop { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .etype { font-size: 11px; font-weight: 600; color: var(--info-text); }
  .esev { font-size: 10px; padding: 2px 7px; border-radius: 10px; }
  .esev-low { background: var(--success-bg); color: var(--success-text); }
  .esev-med { background: var(--warn-bg); color: var(--warn-text); }
  .esev-high { background: var(--danger-bg); color: var(--danger-text); }
  .ets { font-size: 10px; color: var(--text3); margin-left: auto; }
  .edesc { font-size: 12px; color: var(--text); margin-top: 3px; }
  .emeta { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .btn-del { font-size: 10px; color: var(--danger-text); background: none; border: none; cursor: pointer; padding: 0; margin-left: 4px; }
  .empty { text-align: center; padding: 2rem 0; color: var(--text3); font-size: 13px; }

  .report-foot { margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--border); }
  .cd-val { font-size: 22px; font-weight: 600; }
  .cd-lbl { font-size: 10px; color: var(--text2); margin-bottom: 12px; }

  /* ── MODALS ── */
  .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 320px; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .modal p { font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.6; }
  .modal input { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; margin-bottom: 8px; outline: none; }
  .merr { font-size: 11px; color: var(--danger-text); min-height: 16px; margin-bottom: 8px; }
  .mbtns { display: flex; gap: 8px; }
  .mbtns button { flex: 1; padding: 8px; font-size: 13px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border2); font-weight: 500; }

  .rmodal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; }
  .rmodal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .rbody { font-size: 12px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; min-height: 100px; }
  .rbtns { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .rbtns button { flex: 1; padding: 9px; font-size: 13px; border-radius: var(--radius); cursor: pointer; font-weight: 500; }

  /* ── SETUP SCREEN ── */
  .setup-wrap { max-width: 600px; margin: 2rem auto; padding: 1rem; }
  .setup-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 14px; }
  .setup-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .step-num { width: 24px; height: 24px; background: var(--blue); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .setup-card p { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 10px; }
  .code-block { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: 'Courier New', monospace; font-size: 12px; color: var(--text); margin: 10px 0; word-break: break-all; }
  .setup-input { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 13px; margin-top: 8px; outline: none; font-family: 'Courier New', monospace; }
  .setup-input:focus { border-color: var(--blue); }
  .info-box { background: var(--info-bg); border-left: 3px solid var(--blue); padding: 10px 14px; border-radius: 0 var(--radius) var(--radius) 0; margin: 10px 0; font-size: 12px; color: var(--info-text); line-height: 1.6; }

  /* ── SPINNER ── */
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  #toast.ok { background: var(--success-bg); color: var(--success-text); border: 0.5px solid var(--success-text); opacity: 1; }
  #toast.bad { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-text); opacity: 1; }

  .hide { display: none !important; }
</style>
</head>
<body>

<div id="root"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURATION — Fill these in during setup
// ═══════════════════════════════════════════════════════
const CONFIG = {
  // Step 1: Azure App Registration
  CLIENT_ID: 'bc3a27e0-632d-4047-b4f4-8a9b52d6224d',
  TENANT_ID: 'da106b2f-273c-4005-8495-3630f61e3e9f',

  // Step 2: OneDrive Excel file path (relative to your OneDrive root)
  EXCEL_PATH: 'SecurityDashboard/SecurityEvents.xlsx',

  // Step 3: Anthropic API key for weekly report generation
  ANTHROPIC_KEY: localStorage.getItem('vaalgas_anthropic_key') || '',

  // Dashboard users — add/remove as needed
  USERS: {
    admin:   { pass: 'Security1',  role: 'Administrator' },
    officer: { pass: 'Guard2024',  role: 'Security Officer' },
    manager: { pass: 'Manager99',  role: 'Site Manager' }
  },

  // Deletion password
  DELETE_PASS: 'Admin@Delete1',

  // Microsoft Graph scopes needed
  SCOPES: ['Files.ReadWrite', 'User.Read']
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = {
  screen: CONFIG.CLIENT_ID === 'YOUR_CLIENT_ID_HERE' ? 'setup' : (!CONFIG.ANTHROPIC_KEY ? 'setup' : 'auth'),
  user: null,
  msToken: null,
  events: [],
  selType: 'Incident / breach',
  selSev: 'Low',
  filterType: '',
  filterSev: '',
  pendingDelId: null,
  reportText: '',
  loading: false,
  syncStatus: 'idle', // idle | syncing | ok | err
  workbookId: null,
  worksheetId: null,
};

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
const root = document.getElementById('root');
const toast = document.getElementById('toast');

function showToast(msg, bad = false) {
  toast.textContent = msg;
  toast.className = bad ? 'bad' : 'ok';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.className = '', 3000);
}

function fmtDate(d) {
  return d.toLocaleDateString('en-ZA', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtDT(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-ZA', { weekday: 'short', day: '2-digit', month: 'short' })
    + ' ' + d.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
}

function weekRange(d) {
  const day = d.getDay(), diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d); mon.setDate(d.getDate() + diff); mon.setHours(0, 0, 0, 0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23, 59, 59, 999);
  return { mon, sun };
}
function prevWeekRange() {
  const { mon: tm } = weekRange(new Date());
  const pm = new Date(tm); pm.setDate(tm.getDate() - 7);
  const ps = new Date(tm); ps.setDate(tm.getDate() - 1); ps.setHours(23, 59, 59, 999);
  return { mon: pm, sun: ps };
}
function weekEvents() {
  const { mon, sun } = weekRange(new Date());
  return state.events.filter(e => { const d = new Date(e.dt); return d >= mon && d <= sun; });
}
function countdown() {
  const now = new Date(), d = now.getDay(), daysUntil = (8 - d) % 7 || 7;
  const next = new Date(now); next.setDate(now.getDate() + daysUntil); next.setHours(8, 0, 0, 0);
  const diff = next - now, h = Math.floor(diff / 3600000), days = Math.floor(h / 24), rh = h % 24;
  return days > 0 ? `${days}d ${rh}h` : `${h}h`;
}

// ═══════════════════════════════════════════════════════
// MICROSOFT AUTH (MSAL implicit flow via redirect)
// ═══════════════════════════════════════════════════════
function getMSAuthUrl() {
  const params = new URLSearchParams({
    client_id: CONFIG.CLIENT_ID,
    response_type: 'token',
    redirect_uri: window.location.href.split('#')[0],
    scope: CONFIG.SCOPES.join(' '),
    response_mode: 'fragment',
    prompt: 'select_account'
  });
  return `https://login.microsoftonline.com/${CONFIG.TENANT_ID}/oauth2/v2.0/authorize?${params}`;
}

function parseMSToken() {
  const hash = window.location.hash.substring(1);
  if (!hash) return null;
  const params = new URLSearchParams(hash);
  if (params.get('access_token')) {
    history.replaceState(null, '', window.location.pathname);
    return params.get('access_token');
  }
  return null;
}

async function msGet(path) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    headers: { Authorization: `Bearer ${state.msToken}` }
  });
  if (!r.ok) throw new Error(`Graph API error: ${r.status}`);
  return r.json();
}

async function msPatch(path, body) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${state.msToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`Graph PATCH error: ${r.status}`);
  return r.json();
}

async function msPost(path, body) {
  const r = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${state.msToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.text();
    throw new Error(`Graph POST error: ${r.status} ${err}`);
  }
  return r.json();
}

// ═══════════════════════════════════════════════════════
// EXCEL / GRAPH OPERATIONS
// ═══════════════════════════════════════════════════════
async function getWorkbook() {
  if (state.workbookId) return;
  const item = await msGet(`/me/drive/root:/${CONFIG.EXCEL_PATH}`);
  state.workbookId = item.id;
  const sheets = await msGet(`/me/drive/items/${item.id}/workbook/worksheets`);
  state.worksheetId = sheets.value[0].id;
}

async function loadEventsFromExcel() {
  state.syncStatus = 'syncing'; render();
  try {
    await getWorkbook();
    const range = await msGet(
      `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/usedRange`
    );
    const rows = range.values || [];
    // Skip header row (row 0)
    state.events = rows.slice(1).filter(r => r[0]).map(r => ({
      id: String(r[0]),
      type: String(r[1] || ''),
      sev: String(r[2] || 'Low'),
      dt: String(r[3] || ''),
      loc: String(r[4] || ''),
      desc: String(r[5] || ''),
      by: String(r[6] || '')
    }));
    state.syncStatus = 'ok';
  } catch (e) {
    state.syncStatus = 'err';
    showToast('Could not load from Excel: ' + e.message, true);
  }
  render();
}

async function appendEventToExcel(ev) {
  await getWorkbook();
  // Find next empty row
  const range = await msGet(
    `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/usedRange`
  );
  const nextRow = (range.values || []).length + 1; // 1-indexed, after header
  const cellAddress = `A${nextRow}`;
  await msPatch(
    `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/range(address='${cellAddress}')`,
    {
      values: [[
        ev.id, ev.type, ev.sev, ev.dt, ev.loc,
        ev.desc, ev.by
      ]]
    }
  );
}

async function deleteEventFromExcel(id) {
  await getWorkbook();
  const range = await msGet(
    `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/usedRange`
  );
  const rows = range.values || [];
  const rowIndex = rows.findIndex((r, i) => i > 0 && String(r[0]) === id);
  if (rowIndex === -1) return;
  const excelRow = rowIndex + 1; // 1-indexed
  // Clear the row content
  await msPatch(
    `/me/drive/items/${state.workbookId}/workbook/worksheets/${state.worksheetId}/range(address='A${excelRow}:G${excelRow}')`,
    { values: [['', '', '', '', '', '', '']] }
  );
}

// ═══════════════════════════════════════════════════════
// REPORT GENERATION
// ═══════════════════════════════════════════════════════
async function generateReport() {
  const { mon, sun } = prevWeekRange();
  const week = state.events.filter(e => {
    const d = new Date(e.dt); return d >= mon && d <= sun;
  }).sort((a, b) => new Date(a.dt) - new Date(b.dt));

  const grouped = {};
  week.forEach(e => {
    const day = new Date(e.dt).toLocaleDateString('en-ZA', { weekday: 'long', day: '2-digit', month: 'long' });
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(e);
  });

  const high = week.filter(e => e.sev === 'High').length;
  const med = week.filter(e => e.sev === 'Medium').length;
  const low = week.filter(e => e.sev === 'Low').length;

  const evText = week.length === 0
    ? 'No events were recorded during this period.'
    : Object.entries(grouped).map(([day, evts]) =>
        `${day}:\n${evts.map(e =>
          `  • [${fmtTime(e.dt)}] [${e.sev.toUpperCase()}]${e.sev === 'High' ? ' [!]' : ''} ${e.type}${e.loc ? ' — ' + e.loc : ''}: ${e.desc}${e.by ? ' (Reported by: ' + e.by + ')' : ''}`
        ).join('\n')}`
      ).join('\n\n');

  showReportModal('<span class="spin"></span> Generating report with AI...', true);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CONFIG.ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: `You are a professional security report writer for Vaalgas (Pty) Ltd, a fuel and LPG storage, wholesale and retail company based in South Africa.

Write a formal weekly security event report:

REPORT PERIOD: ${fmtDate(mon)} to ${fmtDate(sun)}
GENERATED: ${new Date().toLocaleDateString('en-ZA', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })} at ${new Date().toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' })}
TOTAL EVENTS: ${week.length} | High: ${high} | Medium: ${med} | Low: ${low}

EVENTS:
${evText}

Write a professional report with:
1. HEADER — Organisation: Vaalgas (Pty) Ltd, Report Period, Generated, Prepared by: Security Management System
2. EXECUTIVE SUMMARY — 2-3 sentences on the week
3. STATISTICS — events by type and severity in a simple table format
4. DAILY EVENT LOG — each day as a heading, bullet points with time, [SEVERITY], type, location, description, reporter. Mark [!] on HIGH severity
5. KEY FINDINGS — patterns or concerns
6. RECOMMENDATIONS — 2-3 practical actions
7. SIGN-OFF — space for Security Manager name, signature and date

Plain text only. Professional and concise.`
        }]
      })
    });
    const data = await resp.json();
    state.reportText = data.content?.find(b => b.type === 'text')?.text || 'Report generation failed.';
    showReportModal(state.reportText, false);
  } catch (e) {
    showReportModal('Could not generate report. Check your Anthropic API key in the config.', false);
  }
}

function downloadReport() {
  if (!state.reportText) return;
  const { mon, sun } = prevWeekRange();
  const blob = new Blob([state.reportText], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Vaalgas_Security_Report_${fmtDate(mon).replace(/ /g, '-')}_to_${fmtDate(sun).replace(/ /g, '-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════
function render() {
  if (state.screen === 'setup') { renderSetup(); return; }
  if (state.screen === 'auth') { renderAuth(); return; }
  renderDash();
}

function renderSetup() {

      <h1 style="font-size:20px;font-weight:700">Vaalgas Security Dashboard</h1>

function saveSetup() {
  const clientId = document.getElementById('s-clientid').value.trim();
  const tenantId = document.getElementById('s-tenantid').value.trim();
  const apiKey = document.getElementById('s-apikey').value.trim();
  if (!clientId || !tenantId || !apiKey) {
    showToast('Please fill in all three fields', true); return;
  }
  CONFIG.CLIENT_ID = clientId;
  CONFIG.TENANT_ID = tenantId;
  CONFIG.ANTHROPIC_KEY = apiKey;
  localStorage.setItem('vaalgas_cfg', JSON.stringify({ clientId, tenantId }));
  localStorage.setItem('vaalgas_anthropic_key', apiKey);
  state.screen = 'auth';
  render();
}

function renderAuth() {
  root.innerHTML = `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🔒</div>
      <h1>Security portal</h1>
      <p>Vaalgas (Pty) Ltd — Authorised personnel only</p>
      <button class="ms-btn" onclick="signInWithMicrosoft()">
        <svg width="18" height="18" viewBox="0 0 21 21" fill="none"><rect x="0" y="0" width="10" height="10" fill="#f25022"/><rect x="11" y="0" width="10" height="10" fill="#7fba00"/><rect x="0" y="11" width="10" height="10" fill="#00a4ef"/><rect x="11" y="11" width="10" height="10" fill="#ffb900"/></svg>
        Sign in with Microsoft
      </button>
      <div class="divider">or use dashboard credentials</div>
      <div class="field"><label>Username</label><input type="text" id="lu" autocomplete="off" placeholder="Enter username"/></div>
      <div class="field"><label>Password</label><input type="password" id="lp" placeholder="Enter password"/></div>
      <div class="auth-err" id="lerr"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
      <div class="auth-note">Accounts: admin · officer · manager<br>Contact your administrator for access</div>
    </div>
  </div>`;
  document.getElementById('lp').onkeydown = e => { if (e.key === 'Enter') doLogin(); };

  // Check if returning from MS OAuth
  const token = parseMSToken();
  if (token) {
    state.msToken = token;
    state.user = { name: 'Microsoft User', role: 'Microsoft Account' };
    state.screen = 'dash';
    loadEventsFromExcel();
  }
}

function signInWithMicrosoft() {
  window.location.href = getMSAuthUrl();
}

function doLogin() {
  const u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value;
  const match = CONFIG.USERS[u];
  if (match && match.pass === p) {
    state.user = { name: u, role: match.role };
    state.screen = 'dash';
    // Check if MS token available from previous OAuth
    const saved = localStorage.getItem('vaalgas_cfg');
    if (saved) {
      const cfg = JSON.parse(saved);
      CONFIG.CLIENT_ID = cfg.clientId;
      CONFIG.TENANT_ID = cfg.tenantId;
      CONFIG.ANTHROPIC_KEY = localStorage.getItem('vaalgas_anthropic_key') || '';
    }
    if (state.msToken) {
      loadEventsFromExcel();
    } else {
      // No MS token — prompt to connect OneDrive
      state.syncStatus = 'err';
      render();
      showToast('Sign in with Microsoft to sync events to OneDrive', false);
    }
  } else {
    document.getElementById('lerr').textContent = 'Invalid username or password';
  }
}

function renderDash() {
  const we = weekEvents();
  const { mon, sun } = weekRange(new Date());
  let filtered = [...we];
  if (state.filterType) filtered = filtered.filter(e => e.type === state.filterType);
  if (state.filterSev) filtered = filtered.filter(e => e.sev === state.filterSev);
  filtered.sort((a, b) => new Date(b.dt) - new Date(a.dt));

  const syncDot = state.syncStatus === 'ok' ? 'dot-ok' : state.syncStatus === 'syncing' ? 'dot-wait' : 'dot-err';
  const syncLabel = state.syncStatus === 'ok' ? 'Synced to OneDrive Excel' : state.syncStatus === 'syncing' ? 'Syncing...' : state.msToken ? 'Sync error — check connection' : 'Not connected to OneDrive';

  root.innerHTML = `
  <div class="dash">
    <div class="topbar">
      <div>
        <h1>Security events</h1>
        <p>All events sync live to your OneDrive Excel file</p>
      </div>
      <div class="topbar-right">
        <span class="badge badge-user">${state.user.role}: ${state.user.name}</span>
        <span class="badge badge-week">${fmtDate(mon)} – ${fmtDate(sun)}</span>
        ${!state.msToken ? `<button class="btn btn-secondary" style="font-size:11px;padding:5px 10px" onclick="signInWithMicrosoft()">Connect OneDrive</button>` : ''}
        <button class="btn btn-secondary" style="font-size:11px;padding:5px 10px" onclick="doLogout()">Sign out</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">This week</div><div class="stat-val">${we.length}</div><div class="stat-sub">total events</div></div>
      <div class="stat"><div class="stat-label">Incidents</div><div class="stat-val">${we.filter(e => e.type === 'Incident / breach').length}</div></div>
      <div class="stat"><div class="stat-label">Access</div><div class="stat-val">${we.filter(e => e.type === 'Access / perimeter').length}</div></div>
      <div class="stat"><div class="stat-label">Occurrences</div><div class="stat-val">${we.filter(e => e.type === 'Security occurrence').length}</div></div>
      <div class="stat"><div class="stat-label">High severity</div><div class="stat-val red">${we.filter(e => e.sev === 'High').length}</div></div>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-title">Log new event</div>
        <div class="form-row"><label>Event type</label>
          <div class="pills">
            <span class="pill ${state.selType === 'Incident / breach' ? 'on' : ''}" onclick="selType('Incident / breach')">Incident / breach</span>
            <span class="pill ${state.selType === 'Access / perimeter' ? 'on' : ''}" onclick="selType('Access / perimeter')">Access / perimeter</span>
            <span class="pill ${state.selType === 'Security occurrence' ? 'on' : ''}" onclick="selType('Security occurrence')">Security occurrence</span>
          </div>
        </div>
        <div class="form-row"><label>Severity</label>
          <div class="sev-pills">
            <span class="sev-pill low ${state.selSev === 'Low' ? 'on' : ''}" onclick="selSev('Low')">Low</span>
            <span class="sev-pill med ${state.selSev === 'Medium' ? 'on' : ''}" onclick="selSev('Medium')">Medium</span>
            <span class="sev-pill high ${state.selSev === 'High' ? 'on' : ''}" onclick="selSev('High')">High</span>
          </div>
        </div>
        <div class="form-row"><label>Date &amp; time</label><input type="datetime-local" id="edt"/></div>
        <div class="form-row"><label>Location / area</label><input type="text" id="eloc" placeholder="e.g. Gate 3, Server room"/></div>
        <div class="form-row"><label>Description</label><textarea id="edesc" placeholder="What happened?"></textarea></div>
        <div class="form-row"><label>Reported by</label><input type="text" id="eby" placeholder="Name or badge number"/></div>
        <button class="btn-log" id="log-btn" onclick="logEvent()">Log event</button>
      </div>

      <div class="panel" style="display:flex;flex-direction:column">
        <div class="panel-title">Events this week</div>
        <div class="filters">
          <select onchange="state.filterType=this.value;render()">
            <option value="">All types</option>
            <option ${state.filterType === 'Incident / breach' ? 'selected' : ''}>Incident / breach</option>
            <option ${state.filterType === 'Access / perimeter' ? 'selected' : ''}>Access / perimeter</option>
            <option ${state.filterType === 'Security occurrence' ? 'selected' : ''}>Security occurrence</option>
          </select>
          <select onchange="state.filterSev=this.value;render()">
            <option value="">All severities</option>
            <option ${state.filterSev === 'High' ? 'selected' : ''}>High</option>
            <option ${state.filterSev === 'Medium' ? 'selected' : ''}>Medium</option>
            <option ${state.filterSev === 'Low' ? 'selected' : ''}>Low</option>
          </select>
          <button class="btn-refresh" onclick="loadEventsFromExcel()">↻ Sync</button>
        </div>
        <div class="elist">
          ${filtered.length === 0
            ? '<div class="empty">No events logged this week</div>'
            : filtered.map(e => `
              <div class="eitem">
                <div class="etop">
                  <span class="etype">${e.type}</span>
                  <span class="esev esev-${e.sev.toLowerCase()}">${e.sev}</span>
                  <span class="ets">${fmtDT(e.dt)}</span>
                  <button class="btn-del" onclick="openDel('${e.id}')">remove</button>
                </div>
                ${e.loc ? `<div class="emeta">${e.loc}</div>` : ''}
                <div class="edesc">${e.desc}</div>
                ${e.by ? `<div class="emeta">By: ${e.by}</div>` : ''}
              </div>`).join('')}
        </div>
        <div class="report-foot">
          <div class="cd-val">${countdown()}</div>
          <div class="cd-lbl">until Monday auto-report</div>
          <button class="btn btn-report" onclick="generateReport()">Generate weekly PDF report</button>
          <div class="badge-sync" style="margin-top:10px">
            <div class="dot ${syncDot}"></div>
            <span>${syncLabel}</span>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  const now = new Date(), loc = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
  const edt = document.getElementById('edt');
  if (edt) edt.value = loc.toISOString().slice(0, 16);

  // Monday auto-report
  if (new Date().getDay() === 1) {
    const k = 'auto_rpt_' + new Date().toDateString();
    if (!sessionStorage.getItem(k)) {
      sessionStorage.setItem(k, '1');
      setTimeout(generateReport, 2000);
    }
  }
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function selType(t) { state.selType = t; render(); }
function selSev(s) { state.selSev = s; render(); }
function doLogout() { state.user = null; state.events = []; state.screen = 'auth'; render(); }

async function logEvent() {
  const dt = document.getElementById('edt').value;
  const desc = document.getElementById('edesc').value.trim();
  if (!dt || !desc) { showToast('Date/time and description are required', true); return; }

  const btn = document.getElementById('log-btn');
  btn.disabled = true; btn.textContent = 'Saving...';

  const ev = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    type: state.selType, sev: state.selSev, dt,
    loc: document.getElementById('eloc').value.trim(),
    desc,
    by: document.getElementById('eby').value.trim()
  };

  state.events.push(ev);

  if (state.msToken) {
    try {
      await appendEventToExcel(ev);
      state.syncStatus = 'ok';
      showToast('Event logged and saved to OneDrive Excel');
    } catch (e) {
      state.syncStatus = 'err';
      showToast('Logged locally — Excel sync failed: ' + e.message, true);
    }
  } else {
    showToast('Event logged locally (connect OneDrive to sync)');
  }
  render();
}

function openDel(id) {
  state.pendingDelId = id;
  const wrap = document.createElement('div');
  wrap.className = 'modal-wrap'; wrap.id = 'del-modal';
  wrap.innerHTML = `
    <div class="modal">
      <h3>Confirm deletion</h3>
      <p>Enter the admin deletion password to permanently remove this entry from the dashboard and the Excel file.</p>
      <input type="password" id="dp" placeholder="Deletion password"/>
      <div class="merr" id="derr"></div>
      <div class="mbtns">
        <button class="btn-secondary" onclick="closeDel()">Cancel</button>
        <button class="btn-danger" onclick="confirmDel()">Delete entry</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  setTimeout(() => document.getElementById('dp').focus(), 80);
  document.getElementById('dp').onkeydown = e => { if (e.key === 'Enter') confirmDel(); };
}
function closeDel() { document.getElementById('del-modal')?.remove(); }

async function confirmDel() {
  if (document.getElementById('dp').value !== CONFIG.DELETE_PASS) {
    document.getElementById('derr').textContent = 'Incorrect password. Access denied.'; return;
  }
  const btn = document.querySelector('#del-modal .btn-danger');
  btn.textContent = 'Deleting...'; btn.disabled = true;

  if (state.msToken) {
    try {
      await deleteEventFromExcel(state.pendingDelId);
      state.syncStatus = 'ok';
    } catch (e) {
      showToast('Excel delete failed: ' + e.message, true);
    }
  }
  state.events = state.events.filter(e => e.id !== state.pendingDelId);
  closeDel(); showToast('Entry deleted'); render();
}

function showReportModal(content, isLoading) {
  document.getElementById('r-modal')?.remove();
  const wrap = document.createElement('div');
  wrap.className = 'modal-wrap'; wrap.id = 'r-modal';
  wrap.innerHTML = `
    <div class="rmodal">
      <h3>Weekly security report</h3>
      <div class="rbody" id="rbody">${isLoading ? content : ''}</div>
      ${!isLoading ? `<div class="rbody" id="rbody-text" style="display:block">${content.replace(/</g,'&lt;')}</div>` : ''}
      <div class="rbtns">
        <button class="btn btn-primary ${isLoading ? 'hide' : ''}" id="btn-dl" onclick="downloadReport()">Download report</button>
        <button class="btn btn-secondary" onclick="document.getElementById('r-modal').remove()">Close</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
(function init() {
  // Restore saved config
  const saved = localStorage.getItem('vaalgas_cfg');
  if (saved) {
    try {
      const cfg = JSON.parse(saved);
      CONFIG.CLIENT_ID = cfg.clientId;
      CONFIG.TENANT_ID = cfg.tenantId;
      CONFIG.ANTHROPIC_KEY = localStorage.getItem('vaalgas_anthropic_key') || '';
      state.screen = 'auth';
    } catch(e) {}
  }
  // Check for MS OAuth token in URL
  const token = parseMSToken();
  if (token) {
    state.msToken = token;
  }
  render();
})();
</script>
